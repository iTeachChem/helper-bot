zerops:
  - setup: bot
    type: python@3.12
    build:
      base: python@3.12
      buildCommands:
        - pip install --target=./vendor -r requirements.txt
      deployFiles:
        - core
        - main.py
        - requirements.txt
        - zerops.yml
        - config.toml
        - vendor
      cache:
        - vendor
    run:
      base: python@3.12
      envVariables:
        PYTHONPATH: /var/www/vendor
      ports:
        - port: 8080
          httpSupport: true
      start: python main.py
